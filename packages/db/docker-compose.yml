name: reurci

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: reurci-postgres
    environment:
      POSTGRES_DB: reurci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - reurci_postgres_data_v2:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  reurci_postgres_data_v2:
